server:
  port: 0
  shutdown: graceful

spring:
  application:
    name: image-ingestion-management-shred-test
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/image_ingestion_test}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 2
      connection-timeout: 5000
      idle-timeout: 30000
      max-lifetime: 60000
      leak-detection-threshold: 10000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/dummy
  lifecycle:
    timeout-per-shutdown-phase: 10s

storage:
  profile: minio
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${TEST_BUCKET_NAME:image-storage}

# Disable cleanup cron job in tests to prevent JVM hanging
cleanup:
  cron: ${CLEANUP_CRON:-}

logging:
  level:
    root: ${LOGGING_ROOT_LEVEL:INFO}
    com.zaxxer.hikari: WARN
    org.hibernate: WARN

# Custom flags from UML
useTestcontainers: ${USE_TESTCONTAINERS:false}
disableSecurity: ${DISABLE_SECURITY:true}
bucketName: ${TEST_BUCKET_NAME:image-storage}
loggingRootLevel: ${LOGGING_ROOT_LEVEL:INFO}
cleanupCron: ${CLEANUP_CRON:-}

management:
  endpoint:
    shutdown:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,shutdown
